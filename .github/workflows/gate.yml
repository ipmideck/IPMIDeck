name: gate
on:
  workflow_call:
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history: tests/integration/test_baseline_invariance.py diffs pinned
          # commits (a9d2f12, b207817, 86268dd) and fails loudly on a shallow clone.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev]"
      - run: npm ci
        working-directory: frontend
      - run: python -m ruff check backend tests
      - run: python -m pytest --cov --cov-report=term-missing
      - run: node scripts/check-i18n-parity.mjs
      - run: npm run test
        working-directory: frontend
      - run: npx tsc -b --noEmit
        working-directory: frontend
      - run: node scripts/check-spa-built.mjs
