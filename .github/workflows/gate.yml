name: gate
on:
  workflow_call:
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev]"
      - run: npm ci
        working-directory: frontend
      - run: python -m ruff check backend tests
      - run: python -m pytest --cov --cov-report=term-missing
      - run: node scripts/check-i18n-parity.mjs
      - run: npm run test
        working-directory: frontend
