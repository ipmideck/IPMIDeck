name: release
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run: build wheel + image (push:false), skip all publish jobs"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  guard:                 # D-16: tag must match branding._VERSION_FALLBACK (push only)
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Tag matches branding._VERSION_FALLBACK
        run: |
          TAG="${GITHUB_REF_NAME#v}"          # v2.0.0 -> 2.0.0
          LIT="$(python -c 'import ast,pathlib; \
            src=pathlib.Path("backend/core/branding.py").read_text(encoding="utf-8"); \
            t=ast.parse(src); \
            print(next(n.value.value for n in ast.walk(t) \
              if isinstance(n,ast.Assign) \
              and any(getattr(x,"id",None)=="_VERSION_FALLBACK" for x in n.targets)))')"
          echo "tag=$TAG literal=$LIT"
          test "$TAG" = "$LIT"                  # fail the release on drift

  tests:
    uses: ./.github/workflows/gate.yml

  # ---- dispatch dry-run (push:false, publishes nothing) — D-08 ----
  dryrun-build:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade build
      - run: python -m build           # version from attr: -> _VERSION_FALLBACK ; dist/ gitignored
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: |
            VERSION=0.0.0-dispatch
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- tag-push publish (real) — D-09 gates every publish on event_name == 'push' ----
  pypi:
    if: ${{ github.event_name == 'push' }}
    needs: [guard, tests]
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # OIDC / Trusted Publishing — no secret
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade build
      - run: python -m build           # version comes from attr: -> _VERSION_FALLBACK
      - uses: pypa/gh-action-pypi-publish@release/v1   # zero-config with id-token: write, dist/ default

  ghcr:
    if: ${{ github.event_name == 'push' }}
    needs: [guard, tests]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3          # D-12: arm64 emulation
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64     # D-12 multi-arch
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Docker Hub (D-01..D-04) — skip-safe when secrets.DOCKERHUB_TOKEN absent ----
  dockerhub-preflight:
    if: ${{ github.event_name == 'push' }}
    needs: [guard, tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}   # secret allowed in env:, not in job if:
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

  dockerhub:
    needs: [dockerhub-preflight]
    if: ${{ needs.dockerhub-preflight.outputs.has_token == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          username: devluigi06            # public handle — hardcode OK (D-02)
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: devluigi06/ipmideck
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sync Docker Hub description (needs read/write/delete PAT — Pitfall 3)
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: devluigi06
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: devluigi06/ipmideck
          readme-filepath: ./README.md

  # ---- Draft GitHub Release (D-10) — user presses Publish ----
  release-draft:
    if: ${{ github.event_name == 'push' }}
    needs: [guard, tests, ghcr]
    runs-on: ubuntu-latest
    permissions:
      contents: write            # required to create the release
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          # tag_name defaults to the pushed tag (github.ref_name)
