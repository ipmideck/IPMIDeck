# Source-build variant. Usage:  docker compose -f docker-compose.dev.yml up --build
services:
  ipmideck:
    build: .
    container_name: ipmideck
    # network_mode: host is LINUX-ONLY (reaches BMCs on UDP 623). On Windows/macOS Docker
    # Desktop, remove it and use port mapping instead:  ports: ["3000:3000"]
    network_mode: host
    # D-26: PID-1 init so an orphaned ipmitool child is reaped instead of becoming a zombie.
    init: true
    volumes:
      - ipmideck-data:/data
    environment:
      - IPMIDECK_DEMO=false
    restart: unless-stopped

volumes:
  ipmideck-data:
